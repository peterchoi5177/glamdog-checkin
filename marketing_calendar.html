<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>글램독 마케팅 캘린더</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#0f1117;color:#e2e8f0;font-size:15px}

/* Header & Nav */
.header{background:linear-gradient(135deg,#1a1d27,#12152a);border-bottom:1px solid #2d3448;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:23px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.header .sub{color:#94a3b8;font-size:13px;margin-top:4px}
.nav-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.nav-btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;border:1px solid #2d3448;color:#e2e8f0;background:#1e2535;transition:all .15s}
.nav-btn:hover{border-color:#4f6ef7;color:#fff;background:#2d3561}
.nav-btn.active{background:#4f6ef7;border-color:#4f6ef7;color:#fff}

/* Tabs */
.tab-bar{display:flex;gap:4px;padding:16px 32px 0;background:#12152a;border-bottom:1px solid #2d3448}
.tab{padding:10px 22px;border-radius:8px 8px 0 0;cursor:pointer;color:#94a3b8;font-weight:600;font-size:14px;transition:.15s;border:1px solid transparent;border-bottom:none}
.tab:hover{color:#e2e8f0;background:#1e2535}
.tab.active{color:#fff;background:#1e2535;border-color:#2d3448}

.content{padding:28px 32px;max-width:1500px;margin:0 auto}

/* OCC 요약 카드 */
.occ-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.occ-card{background:#1a1d27;border:1px solid #2d3448;border-radius:12px;padding:18px 20px}
.occ-card.brand-card{border-color:#4f6ef7;background:#1a1e35}
.occ-card .branch-name{font-size:14px;font-weight:700;color:#c8d6f0;margin-bottom:10px}
.occ-card.brand-card .branch-name{font-size:16px;color:#818cf8}
.occ-card .weeks{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.occ-card .week-col{text-align:center}
.occ-card .week-label{font-size:11px;color:#64748b;margin-bottom:4px;font-weight:600}
.occ-bar-wrap{height:56px;display:flex;align-items:flex-end;justify-content:center;gap:4px}
.occ-bar{border-radius:3px 3px 0 0;min-height:4px}
.occ-pct{font-size:13px;font-weight:700;text-align:center;margin-top:4px}
.occ-sub{font-size:10px;color:#64748b;text-align:center;margin-top:2px}

/* Calendar */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-title{font-size:22px;font-weight:700;color:#fff}
.cal-nav{display:flex;gap:8px}
.cal-nav button{background:#1e2535;border:1px solid #2d3448;color:#e2e8f0;border-radius:7px;padding:8px 18px;cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
.cal-nav button:hover{background:#2d3561;border-color:#4f6ef7}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:8px}
.cal-dow{text-align:center;font-size:13px;font-weight:700;color:#64748b;padding:6px 0}
.cal-dow.sat{color:#60a5fa}
.cal-dow.sun{color:#f87171}

.cal-day{background:#1a1d27;border:1px solid #2d3448;border-radius:10px;padding:10px;min-height:155px;cursor:pointer;transition:.15s;position:relative;overflow:visible}
.cal-day:hover{border-color:#4f6ef7;background:#1e2535}
.cal-day.today{border-color:#4f6ef7;background:#1e2535}
.cal-day.other-month{opacity:.35}
.cal-day.sat .day-num{color:#60a5fa}
.cal-day.sun .day-num{color:#f87171}
.cal-day.season-peak{background:#2a1a0f}
.cal-day.season-high{background:#1f1a0a}
.cal-day.season-med{background:#141f14}
.cal-day.season-spring{background:#1f1220}
.cal-day.season-fall{background:#1e1508}
.cal-day.season-winter{background:#0d1a2a}

.day-num{font-size:18px;font-weight:700;color:#e2e8f0;margin-bottom:6px}
.day-today-badge{display:inline-block;background:#4f6ef7;color:#fff;font-size:10px;font-weight:700;border-radius:4px;padding:2px 5px;margin-left:5px}
.day-events{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.ev-dot{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;padding:3px 7px;border-radius:10px;white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.day-occ{font-size:12px;color:#64748b;margin-top:4px}
.day-occ span{color:#94a3b8;font-weight:600}
.prep-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 7px;border-radius:10px;background:#312e81;color:#a5b4fc;border:1px solid #4338ca;white-space:nowrap;margin-top:4px}
.season-bar{position:absolute;bottom:0;left:0;right:0;height:4px;border-radius:0 0 9px 9px}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:22px;padding:12px 16px;background:#1a1d27;border:1px solid #2d3448;border-radius:10px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8}
.legend-dot{width:11px;height:11px;border-radius:50%}

/* Sidebar layout */
.main-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}
@media(max-width:1000px){.main-layout{grid-template-columns:1fr}}

/* Upcoming events panel */
.panel{background:#1a1d27;border:1px solid #2d3448;border-radius:12px;padding:18px}
.panel-title{font-size:15px;font-weight:700;color:#c8d6f0;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.ev-item{padding:10px 0;border-bottom:1px solid #1e2535;display:flex;flex-direction:column;gap:4px}
.ev-item:last-child{border-bottom:none}
.ev-item .ev-date{font-size:11px;color:#64748b}
.ev-item .ev-name{font-size:13px;font-weight:600;color:#e2e8f0;display:flex;align-items:center;gap:5px}
.ev-item .ev-prep{font-size:11px;color:#94a3b8;font-style:italic}
.ev-item .d-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap}
.d-urgent{background:#7f1d1d;color:#fca5a5}
.d-warn{background:#422006;color:#fed7aa}
.d-plan{background:#1e1b4b;color:#a5b4fc}

/* Suggestions */
.sugg-section{margin-top:28px}
.sugg-title{font-size:17px;font-weight:700;color:#c8d6f0;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.sugg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:14px}
.sugg-card{background:#1a1d27;border:1px solid #2d3448;border-radius:12px;padding:18px}
.sugg-card:hover{border-color:#4f6ef7}
.sugg-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.sugg-icon{font-size:22px;line-height:1;flex-shrink:0;margin-top:1px}
.sugg-info{}
.sugg-branch{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sugg-card-title{font-size:14px;font-weight:700;color:#e2e8f0;margin-top:3px;line-height:1.4}
.sugg-actions{list-style:none;padding:0;margin:0}
.sugg-actions li{font-size:13px;color:#94a3b8;padding:4px 0 4px 14px;position:relative;line-height:1.5}
.sugg-actions li::before{content:"→";position:absolute;left:0;color:#4f6ef7}

/* Updated */
.updated-bar{text-align:right;font-size:12px;color:#475569;margin-bottom:18px}
</style>
</head>

let calYear  = TODAY.getFullYear();

function eventsOnDate(dateStr) {
  return EVENTS.filter(e => e.date === dateStr);
}
function prepStartsOnDate(dateStr) {
  return EVENTS.filter(e => e.prep_start === dateStr && e.lead_days >= 7);
}
function occOnDate(dateStr) {
  return OCC_AVG[dateStr] !== undefined ? OCC_AVG[dateStr] : null;
}
function seasonOnDate(d) {
  const seasons = [
    {name:"극성수기",  start:"2026-07-25", end:"2026-08-15", color:"#ef4444", bg:"season-peak"},
    {name:"성수기",    start:"2026-07-01", end:"2026-07-24", color:"#f97316", bg:"season-high"},
    {name:"준성수기",  start:"2026-08-16", end:"2026-08-31", color:"#f59e0b", bg:"season-med"},
    {name:"봄준성수기",start:"2026-05-01", end:"2026-06-30", color:"#f59e0b", bg:"season-med"},
    {name:"벚꽃시즌",  start:"2026-04-01", end:"2026-04-20", color:"#f9a8d4", bg:"season-spring"},
    {name:"가을단풍",  start:"2026-10-10", end:"2026-10-31", color:"#d97706", bg:"season-fall"},
    {name:"가을성수기",start:"2026-09-23", end:"2026-10-11", color:"#f59e0b", bg:"season-med"},
    {name:"겨울시즌",  start:"2026-12-21", end:"2026-12-31", color:"#93c5fd", bg:"season-winter"},
  ];
  for (const s of seasons) {
    if (d >= s.start && d <= s.end) return s;
  }
  return null;
}

function moveMonth(delta) {
  if (delta === 0) { calYear = TODAY.getFullYear(); calMonth = TODAY.getMonth(); }
  else { calMonth += delta; if (calMonth > 11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;} }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById("calTitle").textContent = `${calYear}년 ${MONTH_KO[calMonth]}`;

  // DOW header
  const dowEl = document.getElementById("calDow");
  dowEl.innerHTML = DOW_KO.map((d,i) =>
    `<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`
  ).join("");

  // First day of month (0=Sun → adjust to Mon=0)
  const first = new Date(calYear, calMonth, 1);
  const firstDow = first.getDay(); // 0=Sun (일요일 시작)
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  const cells = [];
  // prev month padding
  const prevDays = new Date(calYear, calMonth, 0).getDate();
  for (let i = firstDow-1; i >= 0; i--) {
    cells.push({day: prevDays-i, month: calMonth-1, year: calYear, other: true});
  }
  // current month
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({day: d, month: calMonth, year: calYear, other: false});
  }
  // next month padding
  const remain = (7 - cells.length % 7) % 7;
  for (let d = 1; d <= remain; d++) {
    cells.push({day: d, month: calMonth+1, year: calYear, other: true});
  }

  const grid = document.getElementById("calGrid");
  grid.style.gridTemplateColumns = "repeat(7,1fr)";
  grid.innerHTML = cells.map(cell => {
    const yr   = cell.other ? (cell.month<0?calYear-1:(cell.month>11?calYear+1:calYear)) : calYear;
    const mo   = ((cell.month % 12) + 12) % 12;
    const ds   = `${yr}-${String(mo+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}`;
    const dow  = new Date(yr, mo, cell.day).getDay();
    const isToday = ds === TODAY.toISOString().slice(0,10);
    const evs  = eventsOnDate(ds);
    const preps= prepStartsOnDate(ds);
    const occ  = occOnDate(ds);
    const season = seasonOnDate(ds);

    let cls = "cal-day";
    if (cell.other) cls += " other-month";
    if (isToday)    cls += " today";
    if (dow === 6)  cls += " sat";
    if (dow === 0)  cls += " sun";
    if (season)     cls += " " + season.bg;

    // Event dots (max 3 + overflow)
    const showEvs = evs.slice(0,3);
    const overflow = evs.length > 3 ? evs.length - 3 : 0;
    const dotsHtml = showEvs.map(e =>
      `<span class="ev-dot" style="background:${e.color}22;color:${e.color};border:1px solid ${e.color}44">${e.name}</span>`
    ).join("") + (overflow ? `<span class="ev-dot" style="background:#1e2535;color:#64748b">+${overflow}</span>` : "");

    // Prep badges
    const prepHtml = preps.slice(0,2).map(p =>
      `<div class="prep-badge">📋 D-${p.lead_days} ${p.name}</div>`
    ).join("");

    const occHtml = occ !== null ? `<div class="day-occ">전체평균 <span>${occ}%</span></div>` : "";
    const seasonBar = season ? `<div class="season-bar" style="background:${season.color}"></div>` : "";
    const todayBadge = isToday ? `<span class="day-today-badge">오늘</span>` : "";

    return `<div class="${cls}" onclick="showDayDetail('${ds}')">
      <div class="day-num">${cell.day}${todayBadge}</div>
      <div class="day-events">${dotsHtml}</div>
      ${prepHtml}
      ${occHtml}
      ${seasonBar}
    </div>`;
  }).join("");

  renderUpcoming();
  renderLegend();
}

function renderUpcoming() {
  const todayStr = TODAY.toISOString().slice(0,10);
  const upcoming = EVENTS
    .filter(e => e.date >= todayStr && e.days_until <= 60)
    .sort((a,b) => a.date.localeCompare(b.date));

  const list = document.getElementById("upcomingList");
  if (!upcoming.length) { list.innerHTML = '<div style="color:#64748b;font-size:12px">60일 내 이벤트 없음</div>'; return; }

  list.innerHTML = upcoming.map(e => {
    let dCls = "d-plan";
    if (e.days_until <= 7)  dCls = "d-urgent";
    else if (e.days_until <= 14) dCls = "d-warn";
    const prepText = e.prep_note ? `<div class="ev-prep">${e.prep_note}</div>` : "";
    return `<div class="ev-item">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="ev-name">
          <span style="width:8px;height:8px;border-radius:50%;background:${e.color};display:inline-block;flex-shrink:0"></span>
          ${e.name}
        </div>
        <span class="d-badge ${dCls}">D-${e.days_until}</span>
      </div>
      <div class="ev-date">${e.date} &nbsp;|&nbsp; ${e.label}</div>
      ${prepText}
    </div>`;
  }).join("");
}

function showDayDetail(ds) {
  const evs   = eventsOnDate(ds);
  const preps = prepStartsOnDate(ds);
  const occ   = occOnDate(ds);
  const season = seasonOnDate(ds);
  if (!evs.length && !preps.length && occ === null) return;

  let msg = `📅 ${ds}\n\n`;
  if (season) msg += `🌡 성수기: ${season.name}\n`;
  if (occ !== null) msg += `📊 전체 평균 OCC: ${occ}%\n`;
  if (evs.length) {
    msg += "\n🗓 이벤트:\n";
    evs.forEach(e => msg += `  · ${e.name} (${e.label})\n    ${e.prep_note||''}\n`);
  }
  if (preps.length) {
    msg += "\n📋 이날부터 준비:\n";
    preps.forEach(p => msg += `  · [D-${p.lead_days}] ${p.name} 준비 시작\n`);
  }
  alert(msg);
}

        <div class="occ-bar-wrap" style="height:${barH}px">
          <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
            <div class="occ-bar" style="height:${hWeekend}px;background:#f97316;width:${barW}px" title="주말"></div>
            <span style="font-size:${isBrand?10:9}px;color:#f97316">주말</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
            <div class="occ-bar" style="height:${hWeekday}px;background:#60a5fa;width:${barW}px" title="주중"></div>
            <span style="font-size:${isBrand?10:9}px;color:#60a5fa">주중</span>
          </div>
        </div>
        <div class="occ-pct" style="color:${occColor(d.total)};font-size:${isBrand?16:13}px">${d.total}%</div>
        <div class="occ-sub">🟠${d.weekend}%  🔵${d.weekday}%</div>
      </div>`;
    }).join("");
    const cardCls = isBrand ? "occ-card brand-card" : "occ-card";
    const icon = isBrand ? "" : "📍 ";
    // 전체 지점 카드는 한 줄 전체 차지
    const style = isBrand ? "grid-column:1/-1" : "";
    return `<div class="${cardCls}" style="${style}">
      <div class="branch-name">${icon}${branch}</div>
      <div class="weeks">${barsHtml}</div>
    </div>`;
  }).join("");
}
